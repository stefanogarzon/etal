<svg viewBox="0 0 680 680" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <title>Et al. — stack of papers</title>
  <desc>A stack of three papers with a colored category tag.</desc>
  <rect width="680" height="680" rx="140" fill="#ede4d0"/>
  <g transform="rotate(-6 340 400)">
    <rect x="180" y="280" width="320" height="280" rx="4" fill="#e8ddc4" stroke="#2a2520" stroke-width="5"/>
  </g>
  <g transform="rotate(4 340 380)">
    <rect x="180" y="250" width="320" height="280" rx="4" fill="#f2e9d4" stroke="#2a2520" stroke-width="5"/>
  </g>
  <g transform="rotate(-1 340 360)">
    <rect x="180" y="180" width="320" height="320" rx="4" fill="#fefcf6" stroke="#2a2520" stroke-width="6"/>
    <rect x="216" y="222" width="200" height="14" rx="2" fill="#2a2520"/>
    <rect x="216" y="248" width="156" height="8" rx="1" fill="#b8aa92"/>
    <rect x="216" y="288" width="232" height="5" rx="1" fill="#c4b9a4"/>
    <rect x="216" y="306" width="216" height="5" rx="1" fill="#c4b9a4"/>
    <rect x="216" y="324" width="232" height="5" rx="1" fill="#c4b9a4"/>
    <rect x="216" y="342" width="200" height="5" rx="1" fill="#c4b9a4"/>
    <text x="340" y="430" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="42" fill="#2a2520">et al.</text>
    <rect x="446" y="180" width="40" height="100" fill="#b34a2a" stroke="#2a2520" stroke-width="5"/>
  </g>
</svg>
